name: "bloquinhos"
arch: "amd64"
platform: "linux"
version: "${VERSION}"
section: "games"
priority: "extra"
maintainer: "Alex Beldam <alexbeldam@gmail.com>, Bernardo Sabino <contatobernardosabino@gmail.com>"
description: "Tetris-like game built with Pygame."
vendor: "alexbeldam, bernardo-sabino"
contents:
  - src: "dist/bloquinhos/bloquinhos"
    dst: "/usr/lib/bloquinhos/bloquinhos"
  - src: "dist/bloquinhos/_internal/*"
    dst: "/usr/lib/bloquinhos/_internal"
  - src: "/usr/lib/bloquinhos/bloquinhos"
    dst: "/usr/bin/bloquinhos"
    type: "symlink"
  - src: "assets/*"
    dst: "/usr/share/bloquinhos/assets"
  - src: "assets/img/logo.png"
    dst: "/usr/share/icons/hicolor/256x256/apps/bloquinhos.png"
  - src: "desktop/bloquinhos.desktop"
    dst: "/usr/share/applications/bloquinhos.desktop"