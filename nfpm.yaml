name: "${APP_ID}"
arch: "${PACKAGE_ARCH}"
platform: "linux"
version: "${VERSION}"
section: "games"
priority: "extra"
maintainer: "${MAINTAINER}"
description: "Tetris-like game built with Pygame."
vendor: "${VENDOR}"
contents:
  - src: "dist/${APP_ID}/${APP_ID}"
    dst: "/usr/lib/${APP_ID}/${APP_ID}"
  - src: "dist/${APP_ID}/_internal/*"
    dst: "/usr/lib/${APP_ID}/_internal"
  - src: "/usr/lib/${APP_ID}/${APP_ID}"
    dst: "/usr/bin/${APP_ID}"
    type: "symlink"
  - src: "assets/*"
    dst: "/usr/share/${APP_ID}/assets"
  - src: "assets/img/logo.png"
    dst: "/usr/share/icons/hicolor/256x256/apps/${APP_ID}.png"
  - src: "desktop/bloquinhos.desktop"
    dst: "/usr/share/applications/${APP_ID}.desktop"