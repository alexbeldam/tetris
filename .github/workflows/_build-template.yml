name: Build Template

on:
  workflow_call:
    inputs:
      artifact_prefix:
        required: true
        type: string
        description: "Prefix for artifact names (e.g., 'test' or 'release')"
      retention_days:
        required: false
        type: number
        default: 90
        description: "Number of days to retain artifacts"
    secrets:
      env_content:
        required: true
        description: "Content for .env file"

jobs:
  build:
    name: Build & Package ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash -el {0}
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            artifact_name: linux
          - os: windows-latest
            artifact_name: windows

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Conda environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          auto-activate-base: false

      - name: Create .env file from Secrets
        run: echo "${{ secrets.env_content }}" > .env

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Install nFPM
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          VERSION=v2.37.1
          curl -fL https://github.com/goreleaser/nfpm/releases/download/${VERSION}/nfpm_${VERSION#v}_amd64.deb -o nfpm.deb
          sudo dpkg -i nfpm.deb
          rm nfpm.deb
          nfpm --version

      - name: Build executable
        run: make build

      - name: Package artifacts
        run: make package

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_prefix }}-${{ matrix.artifact_name }}
          retention-days: ${{ inputs.retention_days }}
          path: |
            *.exe
            *.deb
            *.rpm
